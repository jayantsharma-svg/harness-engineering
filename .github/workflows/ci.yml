name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fail PRs that change a publishable package without a corresponding
  # .changeset entry. Skipped on release PRs opened by the changesets bot
  # (those delete changesets and bump versions, which is the opposite signal).
  changeset-check:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch enough history that origin/main is a usable diff base.
          fetch-depth: 0

      - name: Verify every changed package has a changeset
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: node scripts/check-changesets.mjs

  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Typecheck, lint, and format are platform-independent — only run on ubuntu
      - run: pnpm typecheck
        if: matrix.os == 'ubuntu-latest'

      - run: pnpm lint
        if: matrix.os == 'ubuntu-latest'

      - run: pnpm format:check
        if: matrix.os == 'ubuntu-latest'

      - name: Test (with coverage on ubuntu)
        run: ${{ matrix.os == 'ubuntu-latest' && 'pnpm test:ci' || 'pnpm test' }}

      - name: Coverage ratchet check
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/coverage-ratchet.mjs

      # Guards the baseline-update gating that keeps refresh-baselines PRs from
      # conflicting on coverage/benchmark jitter (see scripts + tests for context).
      - name: Baseline-gating regression test
        if: matrix.os == 'ubuntu-latest'
        run: node --test 'tests/scripts/*.test.mjs'

      - name: Verify generated docs are fresh
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run generate-docs --check

      - name: Verify plugin artifacts are fresh
        if: matrix.os == 'ubuntu-latest'
        run: pnpm generate:plugin:check

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: packages/core/coverage/coverage-final.json,packages/graph/coverage/coverage-final.json,packages/cli/coverage/coverage-final.json,packages/eslint-plugin/coverage/coverage-final.json,packages/linter-gen/coverage/coverage-final.json,packages/orchestrator/coverage/coverage-final.json,packages/types/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Upload coverage artifacts for refresh-baselines to reuse (avoids re-running tests)
      - name: Upload coverage artifacts
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-data
          path: |
            packages/*/coverage/
            coverage-baselines.json
          retention-days: 1

      - run: pnpm test:platform-parity

  # Regenerate auto-generated baselines on main after merge to prevent drift.
  # Downloads coverage from the test job to avoid running the full test suite twice.
  refresh-baselines:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` for the direct-push path; `pull-requests: write` is
      # required for the `gh pr create` fallback used when branch protection
      # blocks direct pushes to main (which is the current configuration —
      # without this permission gh fails with "Resource not accessible by
      # integration" and the merge run is marked failed even when the
      # baseline diff was empty).
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Download coverage from test job instead of re-running tests
      - uses: actions/download-artifact@v5
        with:
          name: coverage-data

      # Update coverage baselines from downloaded data
      - run: node scripts/coverage-ratchet.mjs --update

      # Regenerate architecture baselines (whole-repo aggregate only).
      # A second `--module packages/cli` run was removed (issue #594): it
      # overwrote the whole-repo module-size/dependency-depth aggregates with a
      # cli-only subset, so every clean-checkout `ci check` reported permanent
      # false regressions. `--update-baseline` now rejects `--module`.
      - run: node packages/cli/dist/bin/harness.js check-arch --update-baseline

      # Regenerate benchmark baselines
      - run: node scripts/benchmark-check.mjs --update

      # Commit and push if anything changed
      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BASELINE_FILES=".harness/arch/baselines.json packages/cli/.harness/arch/baselines.json coverage-baselines.json benchmark-baselines.json"
          git add $BASELINE_FILES
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh baselines after merge [skip ci]"
          OURS=$(git rev-parse HEAD)
          # Try direct push first; fall back to PR if branch protection blocks it
          if git push 2>&1; then
            exit 0
          fi
          echo "Direct push blocked by branch protection. Creating PR instead."
          # Fix B: base the PR branch on the CURRENT tip of origin/main, not the
          # (possibly stale) event SHA this run checked out. Concurrent refresh runs
          # otherwise branch from divergent commits and conflict on the same baseline
          # lines; GitHub auto-merge cannot resolve content conflicts, so the loser
          # sits open forever (this was the #671 failure mode).
          git fetch origin main
          BRANCH="chore/refresh-baselines-$(date +%s)"
          git checkout -B "$BRANCH" origin/main
          # Re-apply our freshly generated baselines on top of latest main. The files
          # are regenerated wholesale, so "ours" is always the correct resolution and
          # this re-apply can never conflict.
          git checkout "$OURS" -- $BASELINE_FILES
          git add $BASELINE_FILES
          if git diff --cached --quiet; then
            echo "Latest main already carries these baselines; nothing to PR."
            exit 0
          fi
          git commit -m "chore: refresh baselines after merge [skip ci]"
          git push -u origin "$BRANCH"
          # Create the PR as github-actions[bot] so the PAT owner (a human) can approve it
          # without hitting GitHub's self-approval block.
          PR_URL=$(gh pr create \
            --title "chore: refresh baselines after merge" \
            --body "Auto-generated baseline refresh. Created because direct pushes to main are blocked by branch protection. Branch is based on the current tip of main to avoid concurrent-refresh conflicts." \
            --base main \
            --head "$BRANCH")
          # Defensive scope check (#531): the branch is constructed to contain only
          # baseline files, but never self-approve a PR whose diff reaches beyond
          # them. $BASELINE_FILES is the single source of truth for the allowlist.
          # Fails closed — any unexpected path (or an empty diff) aborts before approval.
          gh pr diff "$PR_URL" --name-only | node scripts/assert-baseline-only-diff.mjs $BASELINE_FILES
          # Approve inline with the PAT. Events triggered by GITHUB_TOKEN do not start
          # workflow runs, so a separate auto-approve workflow on pull_request_target
          # would never fire for this PR.
          GH_TOKEN="$AUTOAPPROVE_PAT" gh pr review "$PR_URL" --approve \
            --body "Auto-approved: baseline refresh from github-actions[bot]."
          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          HUSKY: '0'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOAPPROVE_PAT: ${{ secrets.BASELINE_AUTOAPPROVE_PAT }}
