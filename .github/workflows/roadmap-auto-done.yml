name: Roadmap Auto-Done

# Phase 5 (D6): when a PR is MERGED, flip the roadmap rows whose linked GitHub
# issue was closed by that merge to `done`, then commit the changed shard(s) and
# the regenerated aggregate back to the base branch.
#
# Commit-to-main mechanism (decided at the Phase 5 Task 7 checkpoint):
#   - Push with the workflow's built-in GITHUB_TOKEN under `permissions: contents: write`.
#   - Use a `git pull --rebase` retry loop to absorb concurrent merges racing the push.
# This repo's `main` has no required status checks, so a token push is sufficient.
# Adopters whose branch protection forbids direct pushes should swap this step for
# an app/bypass token or a follow-up-PR step — a Phase 6 rollout doc note, not a
# Phase 5 concern.
#
# The PR `closingIssuesReferences` (issues closed BY the merge) is authoritative:
# the references carry each closing issue's own `owner/repo`, so this path never
# mis-flips a cross-repo issue with a colliding number onto a local row. (The
# offline CLI now also gates on `state_reason`, so both paths skip `wontfix` /
# `not planned` closes.)

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: read
  pull-requests: read

# Serialize commit-to-base across simultaneous PR merges into the same base
# branch: a second auto-done waits for the first to finish its push rather than
# racing it. `cancel-in-progress: false` is mandatory — an in-flight auto-done
# commit must NEVER be cancelled (cancelling could drop a row flip on the floor).
concurrency:
  group: roadmap-auto-done-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  auto-done:
    # Only run when the PR was actually MERGED (not merely closed/abandoned).
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Resolve the PR's closing issue references
        id: closing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch each closing issue's full owner/repo (nameWithOwner), not just
          # its number: a PR can close an issue in a DIFFERENT repo, and a bare
          # number built against this repo could collide with a same-numbered
          # local roadmap row. Emit `owner/repo#number` refs so the reconciler
          # matches the full External-ID.
          REFS=$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$pr){
                  closingIssuesReferences(first:50){
                    nodes { number repository { nameWithOwner } }
                  }
                }
              }
            }' \
            -F owner='${{ github.repository_owner }}' \
            -F repo='${{ github.event.repository.name }}' \
            -F pr=${{ github.event.pull_request.number }} \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes | map("\(.repository.nameWithOwner)#\(.number)") | join(",")')
          echo "refs=$REFS" >> "$GITHUB_OUTPUT"
          if [ -z "$REFS" ]; then
            echo "No roadmap-linked closing issues for this PR; nothing to reconcile."
          else
            echo "Closing issue refs: $REFS"
          fi

      - name: Reconcile auto-done
        if: steps.closing.outputs.refs != ''
        run: node packages/cli/dist/bin/harness.js roadmap reconcile --from-refs "${{ steps.closing.outputs.refs }}"

      - name: Fallback — parse referenced issues when no formal closing refs
        id: fallback
        if: steps.closing.outputs.refs == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The primary path (closingIssuesReferences) was empty — usually a
          # malformed closing keyword in the PR body (e.g. "Closes roadmap #569":
          # the intervening word breaks GitHub's parser). Fall back to references
          # PARSED from the raw PR body+title, then keep only issues this repo
          # closed as completed. SELF-CORRECTING RISK: a PR that merely mentions an
          # unrelated closed-completed issue whose number matches a roadmap row's
          # External-ID can flip that row. Requires BOTH a matching External-ID AND
          # a closed-completed issue — an acceptable, scoped, self-correcting risk.
          # We deliberately do NOT trigger a full offline sweep here.
          PR=${{ github.event.pull_request.number }}
          TEXT=$(gh pr view "$PR" --json body,title --jq '.body + "\n" + .title')
          NUMS=$(printf '%s' "$TEXT" | node packages/cli/dist/bin/harness.js roadmap referenced-issues)
          REFS=""
          for n in $NUMS; do
            STATE=$(gh issue view "$n" --json state --jq '.state' 2>/dev/null || echo "")
            REASON=$(gh issue view "$n" --json stateReason --jq '.stateReason' 2>/dev/null || echo "")
            if [ "$STATE" = "CLOSED" ] && { [ "$REASON" = "COMPLETED" ] || [ -z "$REASON" ] || [ "$REASON" = "null" ]; }; then
              REF="${{ github.repository }}#$n"
              REFS="${REFS:+$REFS,}$REF"
            fi
          done
          echo "refs=$REFS" >> "$GITHUB_OUTPUT"
          if [ -z "$REFS" ]; then
            echo "Fallback found no closed-completed referenced issues; nothing to reconcile."
          else
            echo "Fallback closing issue refs: $REFS"
          fi

      - name: Reconcile auto-done (fallback)
        if: steps.closing.outputs.refs == '' && steps.fallback.outputs.refs != ''
        run: node packages/cli/dist/bin/harness.js roadmap reconcile --from-refs "${{ steps.fallback.outputs.refs }}"

      # In sharded mode the reconcile writes ONLY the changed shard(s); the
      # aggregate is generated, so it must be regenerated from the shards before
      # we commit (otherwise the committed aggregate would be stale). In monolith
      # mode the reconcile already wrote the aggregate directly, so there is no
      # shard dir and this step is skipped.
      - name: Regenerate the aggregate when sharded
        if: steps.closing.outputs.refs != '' || steps.fallback.outputs.refs != ''
        run: |
          if [ -d docs/roadmap.d ]; then
            node packages/cli/dist/bin/harness.js roadmap regen
          fi

      - name: Commit and push the shard flip
        if: steps.closing.outputs.refs != '' || steps.fallback.outputs.refs != ''
        run: |
          if [ -z "$(git status --porcelain docs/roadmap.d docs/roadmap.md)" ]; then
            echo "Reconcile produced no roadmap changes (rows already done); nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage the aggregate (always present) and the shard dir only when it
          # exists — a bare `git add docs/roadmap.d ...` aborts (exit 128) in a
          # monolith repo that has no shard dir, losing the auto-done flip.
          git add docs/roadmap.md
          [ -d docs/roadmap.d ] && git add docs/roadmap.d
          git commit -m "chore(roadmap): auto-done from merged PR ${{ github.event.pull_request.number }} [skip ci]"
          BASE='${{ github.event.pull_request.base.ref }}'
          for attempt in 1 2 3 4 5; do
            # Clear any rebase left in progress by a previous attempt's conflict,
            # otherwise every later `git pull --rebase` aborts with "rebase in
            # progress" and a transient conflict can never be retried cleanly.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin "$BASE" && git push origin "HEAD:$BASE"; then
              echo "Pushed auto-done commit to $BASE on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (likely a concurrent merge); retrying after rebase."
            sleep 3
          done
          echo "Failed to push auto-done commit after 5 attempts." >&2
          exit 1
