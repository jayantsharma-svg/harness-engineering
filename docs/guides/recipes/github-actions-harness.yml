# Harness CI Check — GitHub Actions Workflow
# Copy this file to .github/workflows/ci.yml in your project
# Or generate it with: harness ci init --platform github

name: Harness Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install harness CLI
        run: npm install -g @harness-engineering/cli

      - name: Run harness checks
        id: harness
        run: |
          harness ci check --json > harness-report.json 2>&1 || true
          echo "exit_code=$(jq -r '.exitCode' harness-report.json)" >> "$GITHUB_OUTPUT"
          echo "failed=$(jq -r '.summary.failed' harness-report.json)" >> "$GITHUB_OUTPUT"
          echo "warnings=$(jq -r '.summary.warnings' harness-report.json)" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: harness ci notify harness-report.json --target pr-comment --pr ${{ github.event.number }}

      - name: Label PR on failure
        if: github.event_name == 'pull_request' && steps.harness.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.number }} --add-label "harness-failed"
          # Add specific labels based on failure type
          if [ "$(jq '[.checks[] | select(.name == "phase-gate" and .status == "fail")] | length' harness-report.json)" -gt 0 ]; then
            gh pr edit ${{ github.event.number }} --add-label "needs-spec"
          fi

      - name: Remove failure label on success
        if: github.event_name == 'pull_request' && steps.harness.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.number }} --remove-label "harness-failed" || true
          gh pr edit ${{ github.event.number }} --remove-label "needs-spec" || true

      - name: Fail on check failure
        if: steps.harness.outputs.exit_code != '0'
        run: exit 1
