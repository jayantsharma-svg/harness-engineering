name: harness-test-advisor
version: "1.0.0"
description: Graph-based test selection and project-wide coverage audit — answers "what tests should I run?" or "what's untested?"
stability: static
cognitive_mode: advisory-guide
triggers:
  - manual
  - on_pr
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Glob
  - Grep
cli:
  command: harness skill run harness-test-advisor
  args:
    - name: path
      description: Project root path
      required: false
    - name: files
      description: Comma-separated list of changed files
      required: false
    - name: audit
      description: Run Coverage Audit mode (project-wide gap analysis) instead of test selection
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-test-advisor
    path: string
type: flexible
tier: 2
phases:
  - name: parse
    description: Identify changed files from diff or input
    required: true
  - name: discover
    description: Find related tests via graph traversal
    required: true
  - name: prioritize
    description: Rank tests by relevance and generate commands
    required: true
state:
  persistent: false
  files: []
depends_on: []
