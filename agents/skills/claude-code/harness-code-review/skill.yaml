name: harness-code-review
version: "2.0.0"
description: Multi-phase code review pipeline with mechanical checks, graph-scoped context, and parallel review agents
stability: static
cognitive_mode: adversarial-reviewer
triggers:
  - manual
  - on_pr
  - on_review
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-code-review
  args:
    - name: path
      description: Project root path
      required: false
    - name: --comment
      description: Post inline comments to GitHub PR
      required: false
    - name: --deep
      description: Add threat modeling pass (invokes security-review --deep)
      required: false
    - name: --no-mechanical
      description: Skip mechanical checks (useful if already run)
      required: false
    - name: --ci
      description: Enable eligibility gate, non-interactive output
      required: false
    - name: --fast
      description: Reduced rigor — skip learnings integration, fast-tier agents only
      required: false
    - name: --thorough
      description: Maximum rigor — always load learnings, full agent roster + meta-judge
      required: false
    - name: --depth
      description: "Override Phase 3.5 depth calibration: quick|standard|deep. 'deep' activates all conditional subagents (adversarial, typescript-strict, frontend-races)."
      required: false
    - name: session-slug
      description: Session slug for scoped state/handoff (passed by autopilot)
      required: false
    - name: commit-range
      description: "Git commit range for diff scope (e.g., abc123..HEAD)"
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-code-review
    path: string
type: rigid
tier: 2
state:
  persistent: false
  files: []
depends_on: []
addresses:
  - signal: high-complexity
    weight: 0.5
  - signal: high-coupling
    weight: 0.4
