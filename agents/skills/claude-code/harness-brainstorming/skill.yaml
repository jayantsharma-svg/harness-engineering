name: harness-brainstorming
version: "1.0.0"
description: Structured ideation and exploration with harness methodology
stability: static
cognitive_mode: constructive-architect
triggers:
  - manual
  - on_new_feature
platforms:
  - claude-code
  - gemini-cli
  - cursor
  - codex
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - emit_interaction
cli:
  command: harness skill run harness-brainstorming
  args:
    - name: path
      description: Project root path
      required: false
    - name: session-slug
      description: Session slug for scoped state/handoff (passed by autopilot)
      required: false
mcp:
  tool: run_skill
  input:
    skill: harness-brainstorming
    path: string
type: rigid
tier: 1
phases:
  - name: explore
    description: Generate ideas and possibilities
    required: true
  - name: evaluate
    description: Assess ideas against constraints
    required: true
  - name: prioritize
    description: Select and sequence top ideas
    required: true
  - name: validate
    description: Run harness checks on selected approach
    required: true
state:
  persistent: false
  files: []
depends_on:
  - harness-planning
  - harness-autopilot
  - harness-soundness-review
